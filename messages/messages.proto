syntax = "proto3";

package christiangeorgelucas.plist_tools;

// A structured error. Present (non-empty code) whenever a node could not
// complete; absent otherwise. Malformed input never throws — it comes back
// as this instead.
message Error {
  string code = 1;
  string message = 2;
}

// The canonical typed value tree every parsing node produces and every
// value-consuming node accepts — the composability envelope for this
// package, mirroring Apple's plist type model exactly (STRING, INTEGER,
// REAL, BOOLEAN, DATE, DATA, ARRAY, DICT) plus NULL_VALUE for the <null/>
// tag some writers/tools emit.
//
// integer_value is a base-10 decimal STRING (optional leading '-'), not a
// numeric field: plist integers can be up to 64-bit signed (rarely 128-bit
// unsigned, in the binary format's extended encoding) — values a JS double
// or a bare int64 field cannot represent exactly once they exceed 2^53. A
// decimal string preserves the exact value losslessly for every caller.
message PlistValue {
  enum PlistType {
    UNKNOWN = 0;
    STRING = 1;
    INTEGER = 2;
    REAL = 3;
    BOOLEAN = 4;
    DATE = 5;
    DATA = 6;
    DICT = 7;
    ARRAY = 8;
    NULL_VALUE = 9;
  }
  PlistType type = 1;
  string string_value = 2;
  // Base-10 decimal string, set only when type == INTEGER.
  string integer_value = 3;
  double real_value = 4;
  bool bool_value = 5;
  // RFC3339 UTC timestamp ("2026-07-21T00:00:00Z"), set only when
  // type == DATE. Always read from the source document — a plist date
  // value is never generated by this package.
  string date_value = 6;
  // Raw bytes, set only when type == DATA. JSON-transported as base64.
  bytes data_value = 7;
  // Ordered key/value pairs, set only when type == DICT. A repeated field
  // (not a proto map) so source key order is preserved exactly.
  repeated PlistEntry dict_value = 8;
  // Set only when type == ARRAY.
  repeated PlistValue array_value = 9;
}

// One key/value pair inside a PlistValue's dict_value, in source order.
message PlistEntry {
  string key = 1;
  PlistValue value = 2;
}

// A raw XML plist document as text, supplied by the caller.
message XmlPlistRequest {
  string xml = 1;
}

// A raw binary plist (bplist00) document, supplied by the caller as bytes
// (JSON-transported as base64).
message BinaryPlistRequest {
  bytes data = 1;
}

// The result of parsing a plist document into the canonical PlistValue tree.
message ParseResult {
  PlistValue value = 1;
  Error error = 2;
}

// Raw file content of unknown format — the input to format detection.
message DetectFormatRequest {
  bytes content = 1;
}

// Result of format detection.
message DetectFormatResult {
  // "xml" | "binary" | "unknown"
  string format = 1;
}

// A PlistValue to serialize back to XML plist text.
message SerializeXmlRequest {
  PlistValue root = 1;
}

message SerializeXmlResult {
  string xml = 1;
  Error error = 2;
}

// Look up a value by a dot-separated key path (dict keys and array indices
// as decimal segments), e.g. "CFBundleURLTypes.0.CFBundleURLSchemes.0".
// NOTE: a literal "." inside a dict key cannot be expressed in a path
// segment — this is a disclosed limitation of dot-separated paths, not a
// bug; use ExtractKey for a single-level lookup on such a key.
message KeyPathRequest {
  PlistValue root = 1;
  string key_path = 2;
}

message KeyPathResult {
  PlistValue value = 1;
  bool found = 2;
  Error error = 3;
}

// Extract a single key's value from a dict, one level deep (no path
// traversal — the key is matched literally, including any "." it contains).
message ExtractKeyRequest {
  PlistValue root = 1;
  string key = 2;
}

message ExtractKeyResult {
  PlistValue value = 1;
  bool found = 2;
  Error error = 3;
}

// List the top-level keys of a dict PlistValue, in source order.
message ListTopLevelKeysRequest {
  PlistValue root = 1;
}

message ListTopLevelKeysResult {
  repeated string keys = 1;
  Error error = 2;
}

// Get the PlistType of a value (e.g. one already extracted via
// GetValueAtPath or ExtractKey).
message GetValueTypeRequest {
  PlistValue value = 1;
}

message GetValueTypeResult {
  PlistValue.PlistType type = 1;
  string type_name = 2;
}

// One entry in a recursive key-path listing: the full dot-path to a node
// in the tree plus its type.
message KeyPathEntry {
  string path = 1;
  PlistValue.PlistType type = 2;
}

// Recursively flatten every key path in the document (dict keys and array
// indices), depth-first, in source order.
message ListAllKeysRequest {
  PlistValue root = 1;
}

message ListAllKeysResult {
  repeated KeyPathEntry entries = 1;
  Error error = 2;
}

// One matched value plus the dot-path where it was found.
message KeyPathValueEntry {
  string path = 1;
  PlistValue value = 2;
}

// Extract every value of a given PlistType anywhere in the tree (e.g. every
// DATA or DATE leaf), each tagged with the dot-path where it was found.
message ExtractByTypeRequest {
  PlistValue root = 1;
  PlistValue.PlistType type = 2;
}

message ExtractByTypeResult {
  repeated KeyPathValueEntry entries = 1;
  Error error = 2;
}

// Convert a PlistValue tree to plain JSON text. Mapping notes: DATE becomes
// an RFC3339 string, DATA becomes a base64 string, INTEGER becomes a JSON
// number when it fits exactly in a JS double (|value| <= Number.
// MAX_SAFE_INTEGER, i.e. 2^53 - 1) and a decimal STRING otherwise (JSON
// has no arbitrary-precision integer type;
// silently narrowing a huge integer to a lossy number would be a bug, not
// a convenience) — check whether a given integer round-tripped through the
// numeric case with GetValueType/inspection of the source if exactness
// matters downstream.
message ConvertToJsonRequest {
  PlistValue root = 1;
}

message ConvertToJsonResult {
  string json = 1;
  Error error = 2;
}

// Convert JSON text directly to an XML plist document. Type inference from
// JSON: string -> STRING, boolean -> BOOLEAN, null -> NULL_VALUE, a number
// with no fractional part -> INTEGER, a number with a fractional part ->
// REAL, object -> DICT (key order preserved), array -> ARRAY. JSON cannot
// express plist's DATE or DATA types directly, so this conversion never
// produces them — round-tripping a plist that went through ConvertToJson
// will turn its original DATE/DATA values into plain strings.
message JsonToXmlRequest {
  string json = 1;
}

message JsonToXmlResult {
  string xml = 1;
  Error error = 2;
}

// One recognized usage-description key (NS*UsageDescription) and its value.
message UsageDescription {
  string key = 1;
  string description = 2;
}

// Extract the common Info.plist fields, when present, from a parsed
// PlistValue tree.
message InfoPlistSummaryRequest {
  PlistValue root = 1;
}

message InfoPlistSummaryResult {
  string bundle_identifier = 1;
  string bundle_version = 2;
  string bundle_short_version_string = 3;
  string bundle_name = 4;
  string bundle_display_name = 5;
  repeated string url_schemes = 6;
  repeated UsageDescription usage_descriptions = 7;
  // True when at least one recognized Info.plist field was found — a
  // convenience signal, not a hard validity gate (a partial/unusual
  // Info.plist can still legitimately have none of these set).
  bool recognized_fields_found = 8;
  Error error = 9;
}

// Validate that a document is a well-formed plist (either the XML or the
// binary form, whichever is supplied) and report issues.
message ValidateRequest {
  oneof source {
    string xml = 1;
    bytes binary = 2;
  }
}

message ValidateResult {
  bool valid = 1;
  // "xml" | "binary" | "unknown"
  string format = 2;
  repeated string issues = 3;
}

// Count keys and summarize a PlistValue tree's structure.
message SummarizeRequest {
  PlistValue root = 1;
}

message SummarizeResult {
  // Every DICT entry anywhere in the tree, counted once each.
  int32 total_keys = 1;
  // Nesting depth of the tree; a bare scalar root is depth 1.
  int32 max_depth = 2;
  int32 dict_count = 3;
  int32 array_count = 4;
  // Count of every value (including container nodes themselves) by
  // PlistType name (e.g. "STRING", "DICT").
  map<string, int32> type_counts = 5;
  Error error = 6;
}
